name: Publish podcast feed

on:
  schedule:
    # 6 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch: # manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Process draft episodes
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Today: $TODAY"

          # Find all draft files for today or earlier
          FOUND=0
          for draft in drafts/*.json; do
            [ -f "$draft" ] || continue

            # Extract date from filename: drafts/2026-03-29_slug-lang.json
            BASENAME=$(basename "$draft" .json)
            DRAFT_DATE=$(echo "$BASENAME" | grep -oP '^\d{4}-\d{2}-\d{2}')

            if [ -z "$DRAFT_DATE" ]; then
              echo "Skipping $draft (no date in filename)"
              continue
            fi

            # Check if draft date is today or earlier
            if [ "$DRAFT_DATE" \> "$TODAY" ]; then
              echo "Skipping $draft (future: $DRAFT_DATE)"
              continue
            fi

            echo "Processing: $draft (date: $DRAFT_DATE)"

            # Read draft JSON and extract feed language (en or te)
            LANG=$(python3 -c "import json; d=json.load(open('$draft')); print(d.get('lang','en'))")

            # Insert the new <item> block into feed.xml right after <channel> opening tags
            ITEM_XML=$(python3 -c "
          import json
          d = json.load(open('$draft'))
          print(d.get('item_xml', ''))
          ")

            FEED="$LANG/feed.xml"
            if [ -f "$FEED" ]; then
              # Insert before the first <item> or before </channel>
              python3 -c "
          import json

          draft = json.load(open('$draft'))
          item_xml = draft.get('item_xml', '')
          lang = draft.get('lang', 'en')
          feed_path = f'{lang}/feed.xml'

          with open(feed_path, 'r') as f:
              content = f.read()

          # Insert new item after the channel header (before first <item> or </channel>)
          if '<item>' in content:
              content = content.replace('<item>', item_xml + '\n    <item>', 1)
          else:
              content = content.replace('</channel>', item_xml + '\n  </channel>')

          with open(feed_path, 'w') as f:
              f.write(content)

          print(f'Added episode to {feed_path}')
          "
            fi

            # Delete processed draft
            rm "$draft"
            FOUND=$((FOUND + 1))
          done

          if [ "$FOUND" -eq 0 ]; then
            echo "No drafts to process"
            exit 0
          fi

          echo "Processed $FOUND draft(s)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Publish scheduled podcast episodes [bot]"
          git push
