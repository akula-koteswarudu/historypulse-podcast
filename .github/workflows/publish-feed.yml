name: Publish podcast feed

on:
  schedule:
    # Runs every hour, checks if any draft is due
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force publish now'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for scheduled drafts
        id: check
        run: |
          # Check if draft branch exists
          if ! git ls-remote --heads origin draft | grep -q draft; then
            echo "No draft branch found"
            echo "has_draft=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check publish time from draft metadata
          git fetch origin draft
          if git show origin/draft:publish_at.txt > /dev/null 2>&1; then
            PUBLISH_AT=$(git show origin/draft:publish_at.txt)
            NOW=$(date -u +%s)
            TARGET=$(date -u -d "$PUBLISH_AT" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%S" "$PUBLISH_AT" +%s 2>/dev/null || echo "0")

            if [ "${{ github.event.inputs.force }}" = "true" ] || [ "$NOW" -ge "$TARGET" ]; then
              echo "Time to publish! (target: $PUBLISH_AT)"
              echo "has_draft=true" >> $GITHUB_OUTPUT
            else
              echo "Not yet (target: $PUBLISH_AT, now: $(date -u))"
              echo "has_draft=false" >> $GITHUB_OUTPUT
            fi
          else
            # No publish_at file = publish immediately
            echo "has_draft=true" >> $GITHUB_OUTPUT
          fi

      - name: Merge draft to main
        if: steps.check.outputs.has_draft == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/draft --no-edit
          # Remove the metadata file from main
          git rm publish_at.txt 2>/dev/null || true
          git commit -m "Remove publish metadata" --allow-empty 2>/dev/null || true
          git push origin main

      - name: Delete draft branch
        if: steps.check.outputs.has_draft == 'true'
        run: |
          git push origin --delete draft 2>/dev/null || true
